services:
  postgres:
    image: postgres:16-alpine
    container_name: omnideck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backups:/backups
    ports:
      - "127.0.0.1:15432:5432"
    deploy:
      resources:
        limits:
          memory: 1.2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: omnideck-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin}
    volumes:
      - mongodata:/data/db
      - backups:/backups
    ports:
      - "127.0.0.1:37017:27017"
    command: ["mongod", "--auth", "--port", "27017", "--wiredTigerCacheSizeGB", "1"]
    deploy:
      resources:
        limits:
          memory: 1.2G
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnideck-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redisdata:/data
      - backups:/backups
    ports:
      - "127.0.0.1:16379:6379"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: omnideck-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: omnideck-frontend
    restart: unless-stopped
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: sqlite:////data/omnideck.db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin}
      OMNIDECK_BACKUP_ROOT: /backups
      OMNIDECK_PUBLIC_HOST: ${OMNIDECK_PUBLIC_HOST:-}
    volumes:
      - frontend_db:/data
      - backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts:/opt/omnideck/scripts:ro
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: omnideck-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
      - "5432:5432"
      - "27017:27017"
      - "6379:6379"
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - frontend

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: omnideck-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    deploy:
      resources:
        limits:
          memory: 30M

  mongo-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: omnideck-mongo-exporter
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin}@mongo:27017/admin
    command: --mongodb.uri=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin}@mongo:27017/admin --web.listen-address=:9216
    ports:
      - "127.0.0.1:9216:9216"
    deploy:
      resources:
        limits:
          memory: 30M

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: omnideck-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    ports:
      - "127.0.0.1:9121:9121"
    deploy:
      resources:
        limits:
          memory: 20M

volumes:
  pgdata:
  mongodata:
  redisdata:
  miniodata:
  frontend_db:
  backups:

networks:
  default:
    name: omnideck_backend
